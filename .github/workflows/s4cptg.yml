        --github-token=${{ github.token }} \
        --pull-request=${{ github.event.pull_request.number }} \
        --behavior=update

  terraform_plan:
    name: Terraform Plan
    needs: [ checkov, infracost ]
    runs-on: s4cptg--774305603403--A
    if: github.event_name == 'pull_request'

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_DIRECTORY }}

    steps:
    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add GitHub to known_hosts
      run: ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Checkout
      uses: actions/checkout@v4.2.2

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3.1.2
      # with:
      #   terraform_version: 1.10.03

    - name: Setup Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: 3.12.4
        cache: 'pip'
    
    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install boto3 botocore argparse

    - name: AWS Assume Role (${{ env.CUSTOMER_ACCT }} role/github-oidc)
      uses: aws-actions/configure-aws-credentials@v4.1.0
      with:
        role-to-assume: "arn:aws:iam::${{ env.CUSTOMER_ACCT }}:role/github-oidc"
        role-session-name: actionsrolesession
        aws-region: ${{ env.AWS_REGION }}
    
    - name: Create Backend S3
      run: |
        python create-backend-s3.py --arg1 "${{ env.AWS_REGION }}" --arg2 "${{ env.CUSTOMER_NAME }}" --arg3 "${{ env.CUSTOMER_ACCT }}"
      working-directory: ${{ env.TF_DIRECTORY }}

    - name: Terraform Init
      id: init
      run: |
        terraform init \
        -backend-config="region=${{ env.AWS_REGION }}" \
        -backend-config="bucket=tf-customer-onboarding--${{ env.CUSTOMER_NAME }}-${{ env.CUSTOMER_ACCT }}" \
        -backend-config="key=${{ env.CUSTOMER_NAME }}-runner.tfstate" \
        -backend-config="dynamodb_table=tf-state-lock--${{ env.CUSTOMER_NAME }}-${{ env.CUSTOMER_ACCT }}" \
        -backend-config="encrypt=true" 
      working-directory: ${{ env.TF_DIRECTORY }}

    - name: Terraform Format
      id: fmt
      run: terraform fmt

    - name: Terraform Validate
      id: validate
      run: terraform validate

    - name: TFLint
      id: tflint
      uses: reviewdog/action-tflint@v1.24.0
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        level: info
        filter_mode: "nofilter"
        working_directory: ${{ env.TF_DIRECTORY }} # Optional. Change working directory
        reporter: github-pr-review # Optional. Change reporter
        fail_level: error # Optional. Fail when on levels: error, warning, info

    - name: Terraform Plan
      id: plan
      run: terraform plan -out=tfplan.out -input=false
      continue-on-error: true # continue on error to exec terraform plan status
      working-directory: ${{ env.TF_DIRECTORY }}

    - name: Update Pull Request
      uses: actions/github-script@v7.0.1
      if: github.event_name == 'pull_request'

      env:
        PLAN: "terraform\n${{ steps.plan.outputs.stdout }}"
      with:
        script: |
          const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
          #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
          #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
          #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`

          <details><summary> Show Plan</summary>

          \`\`\`\n
          ${process.env.PLAN}
          \`\`\`

          </details>

          *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    - name: Terraform Plan Status
      if: steps.plan.outcome == 'failure'
      run: exit 1

  terraform_apply:
    name: Terraform Apply
    needs: check-runners
    runs-on: s4cptg--774305603403--A
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # remove when pipeline is stable
    # needs: terraform_plan
    # if: github.event_name == 'pull_request' # USE PR FOR TESTING

    outputs: 
      job-status: ${{ job.status }}
      config_dc: true 
      config_hana: false

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.TF_DIRECTORY }}

    steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3.1.2
      # with:
      #   terraform_version: 1.10.03

    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Checkout Merge Commit
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Add GitHub to known_hosts
      run: ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Setup Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: 3.12.4
        cache: 'pip'
    
    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install boto3 botocore argparse

    - name: AWS Assume Role (${{ env.CUSTOMER_ACCT }} role/github-oidc)
      uses: aws-actions/configure-aws-credentials@v4.1.0
      with:
        role-to-assume: "arn:aws:iam::${{ env.CUSTOMER_ACCT }}:role/github-oidc"
        role-session-name: actionsrolesession
        aws-region: ${{ env.AWS_REGION }}

    - name: Terraform Init
      id: init
      run: |
        terraform init \
        -backend-config="region=${{ env.AWS_REGION }}" \
        -backend-config="bucket=tf-customer-onboarding--${{ env.CUSTOMER_NAME }}-${{ env.CUSTOMER_ACCT }}" \
        -backend-config="key=${{ env.CUSTOMER_NAME }}-runner.tfstate" \
        -backend-config="dynamodb_table=tf-state-lock--${{ env.CUSTOMER_NAME }}-${{ env.CUSTOMER_ACCT }}" \
        -backend-config="encrypt=true" 
      working-directory: ${{ env.TF_DIRECTORY }}

    - name: Terraform Apply
      id: apply
      continue-on-error: true # continue on error to exec terraform destroy
      run: terraform apply -auto-approve -input=false

