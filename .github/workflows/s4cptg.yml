### [774305603403] s4cptg (eu-west-2) -- London

name: '[774305603403] s4cptg workflow'

on:
  push:
    branches:
    - "main"
    paths:
    - 'terraform/s4cptg/**'
  pull_request:
    branches:    
    - 'main'
    paths:
    - 'terraform/s4cptg/**'
  workflow_dispatch:

env:
  AWS_REGION: "eu-west-2"
  AUTOMATION_ACCT: "231639157514"
  SHARED_ACCT: "812224207958"
  CUSTOMER_ACCT: "774305603403"
  CUSTOMER_NAME: "s4cptg"
  CUSTOMER_ID: "DS4CP01"
  REPO_ORG: "SapphireSystems"
  TF_DIRECTORY: "./terraform/s4cptg"
  SAP_HANA_REVISION: ""
  SAP_HANA_PATCH: ""
  SAP_HANA_COCKPIT: "false"
  SAP_HANA_DEMO_DB: "false"

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  check-runners:
    name: Calling Self-Hosted Runner Workflow
    uses: SapphireSystems/self-hosted-runner/.github/workflows/self-hosted-runner.yml@main
    with:
      aws-region: "eu-west-2"
      automation-acct: "231639157514"
      shared-acct: "812224207958"
      customer-acct: "774305603403"
      customer-name: "s4cptg"
      runner-arch: "arm64" # "x64" # manual switch self-hosted runner arch type << both arch type should be pair
      gh-runner: "ubuntu-latest" ## "ubuntu-22.04" manual switch github runner arch type << both arch type should be pair
    secrets: inherit
    
  checkov:
    name: CheckOV
    needs: check-runners
    runs-on: s4cptg--774305603403--A
    timeout-minutes: 10
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout
      uses: actions/checkout@v4.2.2

    - name: Test with CheckOV
      id: checkov
      uses: bridgecrewio/checkov-action@master #v3.2.223
      continue-on-error: true # force skip for now to fix: CKV_TF_3: to skip terraform backend s3 state lock
      with:
        directory: ./terraform
        framework: terraform
        skip_check: CKV_AWS_126,CKV_AWS_135,CKV_AWS_8,CKV_AWS_144,CKV_AWS_18,CKV_AWS_19,CKV_AWS_145,CKV_AWS_21,CKV2_AWS_34,CKV_TF_1  # Optional: skip a specific check_id. can be comma separated list # Added CKV2_AWS_34 to skip other branches, CKV_TF_1: to skip terraform module sources use a commit hash
        # download_external_modules: true

