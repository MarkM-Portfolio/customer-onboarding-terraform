  configure_sap:
    name: Configure SAP HANA
    needs: terraform_apply
    runs-on: s4cptg--774305603403--B
    timeout-minutes: 180
    continue-on-error: true
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.terraform_apply.outputs.config_hana == 'true'
    # remove when pipeline is stable # USE PR FOR TESTING
    # if: github.event_name == 'pull_request' && needs.terraform_apply.outputs.config_hana == 'true'

    outputs:
      job-status: ${{ job.status }}

    defaults:
      run:
        shell: bash
        working-directory: ./ansible

    steps:
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3.1.2
      # with:
      #   terraform_version: 1.10.03

    - name: Setup SSH Agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Checkout Merge Commit
      uses: actions/checkout@v4.2.2
      with:
        fetch-depth: 0
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Add GitHub to known_hosts
      run: ssh-keyscan github.com >> ~/.ssh/known_hosts

    - name: Clean Ansible Contents # add this for ansible repo branch changes in roles to reflect
      run: rm -rf /home/${{ env.RUNNER_USER }}/.ansible

    - name: Setup Python 3.9
      uses: actions/setup-python@v6
      with:
        python-version: 3.9
        cache: 'pip'

    - name: Install Dependencies
      run: |
        pip install --upgrade pip
        pip install boto3 botocore argparse ansible molecule-ec2

    - name: AWS Assume Role (${{ env.AUTOMATION_ACCT }} role/github-oidc)
      uses: aws-actions/configure-aws-credentials@v4.1.0
      with:
        role-to-assume: "arn:aws:iam::${{ env.AUTOMATION_ACCT }}:role/github-oidc"
        role-session-name: actionsrolesession
        aws-region: ${{ env.AWS_REGION }}

    - name: Allow SAP Hana Bucket
      run: |
        python s3-bucket-access.py --arg1 "${{ env.CUSTOMER_ACCT }}" --arg2 "${{ env.AUTOMATION_ACCT }}" --arg3 "${{ env.AWS_REGION }}" --arg4 insert
      working-directory: ${{ env.TF_DIRECTORY }}

    - name: AWS Assume Role (${{ env.CUSTOMER_ACCT }} role/github-oidc)
      uses: aws-actions/configure-aws-credentials@v4.1.0
      with:
        role-to-assume: "arn:aws:iam::${{ env.CUSTOMER_ACCT }}:role/github-oidc"
        role-session-name: actionsrolesession
        role-duration-seconds: 10800 # 3 hours
        aws-region: ${{ env.AWS_REGION }}
        
    - name: Terraform Init
      id: init
      run: |
        terraform init \
        -backend-config="region=${{ env.AWS_REGION }}" \
        -backend-config="bucket=tf-customer-onboarding--${{ env.CUSTOMER_NAME }}-${{ env.CUSTOMER_ACCT }}" \
        -backend-config="key=${{ env.CUSTOMER_NAME }}-runner.tfstate" \
        -backend-config="dynamodb_table=tf-state-lock--${{ env.CUSTOMER_NAME }}-${{ env.CUSTOMER_ACCT }}" \
        -backend-config="encrypt=true" 
      working-directory: ${{ env.TF_DIRECTORY }}

    - name: Create SSM Parameters
      id: put-ssm
      run: |
        aws ssm put-parameter --name ${{ secrets.DOMAINUSER_SECRET_NAME }} --value "${{ secrets.DOMAINUSER_SECRET }}" --type "SecureString" --overwrite --region ${{ env.AWS_REGION }}
        aws ssm put-parameter --name ${{ secrets.HANA_SECRET_NAME }} --value "${{ secrets.HANA_SECRET }}" --type "SecureString" --overwrite --region ${{ env.AWS_REGION }}
        aws ssm put-parameter --name ${{ secrets.B1ADMIN_SECRET_NAME }} --value "${{ secrets.B1ADMIN_SECRET }}" --type "SecureString" --overwrite --region ${{ env.AWS_REGION }}
        aws ssm put-parameter --name ${{ secrets.B1SITE_SECRET_NAME }} --value "${{ secrets.B1SITE_SECRET }}" --type "SecureString" --overwrite --region ${{ env.AWS_REGION }}
        aws ssm put-parameter --name "/sap/hana/b1/revision" --value ${{ env.SAP_HANA_REVISION }} --type "String" --overwrite --region ${{ env.AWS_REGION }}
        aws ssm put-parameter --name "/sap/hana/b1/patch" --value ${{ env.SAP_HANA_PATCH }} --type "String" --overwrite --region ${{ env.AWS_REGION }}
        aws ssm put-parameter --name "/sap/hana/b1/cockpit" --value ${{ env.SAP_HANA_COCKPIT }} --type "String" --overwrite --region ${{ env.AWS_REGION }}
        aws ssm put-parameter --name "/sap/hana/b1/demo_db" --value ${{ env.SAP_HANA_DEMO_DB }} --type "String" --overwrite --region ${{ env.AWS_REGION }}

    - name: Install requirements
      run: |
        ansible-galaxy install -r ./roles/requirements.yml

    - name: List Collections
      run: |
        ansible-galaxy collection list

    - name: Install roles from private repositories
      run: |
        ansible-galaxy install -r ./roles/roles_sap.yml

    - name: Initializing SAP HANA DB Instance
      run: |
        SAP_HANA_DB_ID=$(aws ec2 describe-instances --filters "Name=tag:ansible_group,Values=sap_hana_db" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].InstanceId" --region ${{ env.AWS_REGION }} --output text)

        sap_hana_db() {
          INSTANCE_NAME="SAP Hana DB"
          MAX_ATTEMPTS=40
          SLEEP_INTERVAL=30
          STATUS="Initializing"
          ATTEMPTS=0

          while [ "$STATUS" != "ok" ] && [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            echo "> Waiting for $INSTANCE_NAME instance ($SAP_HANA_DB_ID) to pass status checks..."
            STATUS=$(aws ec2 describe-instance-status --instance-id $SAP_HANA_DB_ID --query "InstanceStatuses[0].InstanceStatus.Status" --region ${{ env.AWS_REGION }} --output text)
            if [ "$STATUS" == "null" ]; then
              STATUS="Initializing"
            fi
            sleep $SLEEP_INTERVAL
            ATTEMPTS=$((ATTEMPTS + 1))
          done

          if [ "$STATUS" != "ok" ]; then
            echo "$INSTANCE_NAME instance ($SAP_HANA_DB_ID) did not pass status checks in time"
            exit 1
          fi

          echo "$INSTANCE_NAME instance ($SAP_HANA_DB_ID) has PASSED status checks"
        }

        [ ! -z "$SAP_HANA_DB_ID" ] && sap_hana_db &

        wait

        echo "SAP HANA DB instance have PASSED status checks"

    - name: Run Playbook (SAP HANA DB)
      run: |
        ansible-playbook -i ./inventory/aws_ec2.yml ./new_customer_build_saphanadb.yml -vvv

    - name: Initializing SAP HANA Management Instance
      run: |
        SAP_HANA_WIN_ID=$(aws ec2 describe-instances --filters "Name=tag:ansible_group,Values=sap_hana_win" "Name=instance-state-name,Values=running" --query "Reservations[*].Instances[*].InstanceId" --region ${{ env.AWS_REGION }} --output text)

        sap_hana_win() {
          INSTANCE_NAME="SAP Hana Windows"
          MAX_ATTEMPTS=40
          SLEEP_INTERVAL=30
          STATUS="Initializing"
          ATTEMPTS=0

          while [ "$STATUS" != "ok" ] && [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            echo "> Waiting for $INSTANCE_NAME instance ($SAP_HANA_WIN_ID) to pass status checks..."
            STATUS=$(aws ec2 describe-instance-status --instance-id $SAP_HANA_WIN_ID --query "InstanceStatuses[0].InstanceStatus.Status" --region ${{ env.AWS_REGION }} --output text)
            if [ "$STATUS" == "null" ]; then
              STATUS="Initializing"
            fi
            sleep $SLEEP_INTERVAL
            ATTEMPTS=$((ATTEMPTS + 1))
          done

          if [ "$STATUS" != "ok" ]; then
            echo "$INSTANCE_NAME instance ($SAP_HANA_WIN_ID) did not pass status checks in time"
            exit 1
          fi

          echo "$INSTANCE_NAME instance ($SAP_HANA_WIN_ID) has PASSED status checks"
        }

        [ ! -z "$SAP_HANA_WIN_ID" ] && sap_hana_win &

        wait

        echo "HANA Management instance have PASSED status checks"

    - name: Run Playbook (HANA Management)
      run: |
        ansible-playbook -i ./inventory/aws_ec2.yml ./new_customer_build_hanamgmt.yml -vvv

